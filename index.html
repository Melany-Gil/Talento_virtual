<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talento Virtual</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --blue-dark: #062a73;
      --blue-main: #0c3ea8;
      --blue-soft: #1b4fc4;
      --text-dark: #0a1f4d;
      --white: #ffffff;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      background: linear-gradient(135deg, var(--blue-soft) 0%, var(--blue-main) 45%, var(--blue-dark) 100%);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .header {
      width: 100%;
      background: var(--white);
      color: var(--text-dark);
      display: flex;
      align-items: center;
      align-content: center;
      justify-content: flex-start;
      padding: 10px 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header h4 {
      font-size: clamp(1.3rem, 1vw, 1.3rem);
      letter-spacing: -0.5px;
      font-weight: 300;
    }

    /* HERO */
    .hero {
      position: relative;
      flex: 1;
      min-height: calc(100vh - 78px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
      overflow: hidden;
    }

    /* Círculos decorativos */
    .circle {
      position: absolute;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 50%;
      pointer-events: none;
    }

    .circle.one {
      width: 38vw;
      height: 38vw;
      min-width: 280px;
      min-height: 280px;
      top: -8%;
      right: -8%;
    }

    .circle.two {
      width: 58vw;
      height: 58vw;
      min-width: 420px;
      min-height: 420px;
      top: -16%;
      right: -14%;
    }

    .circle.three {
      width: 18vw;
      height: 18vw;
      min-width: 180px;
      min-height: 180px;
      bottom: -6%;
      left: -4%;
      opacity: 0.12;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .content-box {
      width: 100%;
      max-width: 1100px;
      padding: 20px;
      animation: fadeUp 1s ease;
    }

    .main-title {
      color: var(--white);
      font-size: clamp(3rem, 8vw, 8rem);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 0.95;
      margin-bottom: 18px;
      text-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .subtitle {
      color: rgba(255,255,255,0.95);
      font-size: clamp(1.1rem, 2vw, 2.2rem);
      font-weight: 300;
      line-height: 1.3;
      margin-bottom: 55px;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px 28px;
      color: rgba(255,255,255,0.92);
      font-size: clamp(0.95rem, 1.4vw, 1.45rem);
      font-weight: 300;
      line-height: 1.5;
    }

    .feature-item {
      position: relative;
      padding-left: 18px;
      transition: transform 0.25s ease, opacity 0.25s ease;
      cursor: default;
    }

    .feature-item::before {
      content: "•";
      position: absolute;
      left: 0;
      top: 0;
      color: var(--white);
      font-size: 1.1em;
      line-height: 1.2;
    }

    .feature-item:hover {
      transform: translateY(-3px);
      opacity: 1;
    }

    /* Animación sutil */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 992px) {
      .hero {
        min-height: calc(100vh - 72px);
        padding: 30px 18px 45px;
      }

      .content-box {
        max-width: 900px;
      }

      .subtitle {
        margin-bottom: 36px;
      }
    }

    @media (max-width: 768px) {
      .header {
        padding: 15px 16px;
      }

      .hero {
        min-height: calc(100vh - 68px);
      }

      .features {
        flex-direction: column;
        gap: 12px;
      }

      .feature-item {
        padding-left: 0;
      }

      .feature-item::before {
        position: static;
        margin-right: 8px;
      }

      .circle.one {
        width: 75vw;
        height: 75vw;
        top: -6%;
        right: -22%;
      }

      .circle.two {
        width: 100vw;
        height: 100vw;
        top: -12%;
        right: -34%;
      }
    }

    @media (max-width: 480px) {
      .content-box {
        padding: 10px;
      }

      .main-title {
        letter-spacing: -1px;
      }

      .subtitle {
        font-size: 1rem;
      }

      .features {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <h4>CT Talento</h4>
  </header>

  <main class="hero">
    <div class="circle one"></div>
    <div class="circle two"></div>
    <div class="circle three"></div>

    <div class="content">
      <div class="content-box">
        <h2 class="main-title">Talento Virtual</h2>
        <p class="subtitle">Conectando talento colombiano con el mundo</p>

        <div class="features">
          <div class="feature-item">Servicios digitales bilingües</div>
          <div class="feature-item">Asistentes virtuales especializados</div>
          <div class="feature-item">Pymes y startups tecnológicas en EE. UU.</div>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
